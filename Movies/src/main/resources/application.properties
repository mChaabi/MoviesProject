spring.application.name=Movies

# ==============================================================
# CONFIGURATION DU SERVEUR
# ==============================================================
# Dķfinit le prķfixe global pour tous vos contr¶leurs (ex: /api/movies)
server.servlet.context-path=/api
server.port=8080


logging.level.org.springframework.security=DEBUG
# ==============================================================
# CONFIGURATION POSTGRESQL
# ==============================================================
# Remplacez 'nom_de_votre_db' par le nom rķel de votre base
spring.datasource.url=jdbc:postgresql://localhost:5432/Movies
spring.datasource.username=postgres
spring.datasource.password=123456
spring.datasource.driver-class-name=org.postgresql.Driver

# ==============================================================
# CONFIGURATION JPA / HIBERNATE
# ==============================================================
# 'update' permet de crķer/modifier les tables automatiquement sans supprimer les donnķes
spring.jpa.hibernate.ddl-auto=update


# Affiche les requĻtes SQL dans la console (trĶs utile pour le debug)
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Spķcifie le dialecte pour optimiser les requĻtes pour PostgreSQL
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# ==============================================================
# GESTION DES FICHIERS (Vidķos/Reels)
# ==============================================================
# Pour Spring Boot 3.x
spring.web.resources.static-locations=classpath:/static/,file:uploads/
spring.servlet.multipart.max-file-size=1GB
spring.servlet.multipart.max-request-size=1GB
spring.servlet.multipart.enabled=true
spring.web.resources.add-mappings=true

# ????????????????????????????????
# SPRING SECURITY ? Dķsactiver auto-config de base
# ????????????????????????????????
spring.security.user.name=disabled
spring.security.user.password=disabled


# Autorise Tomcat Ó "avaler" les gros flux de donnķes sans couper la connexion
server.tomcat.max-swallow-size=-1
server.tomcat.max-http-post-size=-1



# Augmenter le timeout si l'upload est lent
server.connection-timeout=20000

# Pour ķviter des erreurs si tu tentes de supprimer un fichier encore ouvert par le systĶme
spring.mvc.pathmatch.matching-strategy=ant_path_matcher