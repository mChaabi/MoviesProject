spring.application.name=Movies

# ==============================================================
# CONFIGURATION DU SERVEUR
# ==============================================================
# DÕfinit le prÕfixe global pour tous vos contr¶leurs (ex: /api/movies)
server.servlet.context-path=/api
server.port=8080


logging.level.org.springframework.security=DEBUG
# ==============================================================
# CONFIGURATION POSTGRESQL
# ==============================================================
# Remplacez 'nom_de_votre_db' par le nom rÕel de votre base
spring.datasource.url=jdbc:postgresql://localhost:5432/Movies
spring.datasource.username=postgres
spring.datasource.password=123456
spring.datasource.driver-class-name=org.postgresql.Driver

# ==============================================================
# CONFIGURATION JPA / HIBERNATE
# ==============================================================
# 'update' permet de crÕer/modifier les tables automatiquement sans supprimer les donnÕes
spring.jpa.hibernate.ddl-auto=update


# Affiche les requõtes SQL dans la console (trÒs utile pour le debug)
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# SpÕcifie le dialecte pour optimiser les requõtes pour PostgreSQL
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# ==============================================================
# GESTION DES FICHIERS (VidÕos/Reels)
# ==============================================================
# Pour Spring Boot 3.x
spring.servlet.multipart.max-file-size=1024MB
spring.servlet.multipart.max-request-size=1024MB


# Autorise Tomcat Á "avaler" les gros flux de donnÕes sans couper la connexion
server.tomcat.max-swallow-size=-1
server.tomcat.max-http-post-size=-1



# Augmenter le timeout si l'upload est lent
server.connection-timeout=20000

# Pour Õviter des erreurs si tu tentes de supprimer un fichier encore ouvert par le systÒme
spring.mvc.pathmatch.matching-strategy=ant_path_matcher